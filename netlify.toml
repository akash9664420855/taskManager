# Netlify config — assumes you connect the repo and point the "Base directory" to `client/`
# (or leave Base blank and Netlify reads `base` from this file).

[build]
  base    = "client/"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ---------------------------------------------------------------------------
# IMPORTANT: replace the URL below with your Railway backend URL after the
# backend is deployed. The proxy keeps API calls same-origin from the browser's
# perspective, which lets the HttpOnly refresh cookie work without SameSite=None.
# ---------------------------------------------------------------------------
[[redirects]]
  from   = "/api/*"
  to     = "https://REPLACE-WITH-RAILWAY-URL.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA fallback for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
